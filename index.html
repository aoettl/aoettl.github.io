<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alexander Oettl</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #384252;
      color: #e8e4dd;
    }

    .card {
      text-align: center;
      padding: 3rem 2rem;
    }

    h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 3.2rem;
      font-weight: 300;
      letter-spacing: 0.04em;
      color: #f2efe8;
      margin-bottom: 1.5rem;
    }

    .rule {
      width: 40px;
      height: 1px;
      background: rgba(255,255,255,0.2);
      margin: 0 auto 1.5rem;
    }

    .details {
      font-size: 0.88rem;
      font-weight: 300;
      color: rgba(232,228,221,0.55);
      line-height: 1.9;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .email {
      margin-top: 2rem;
    }

    .email a {
      color: #e8e4dd;
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      transition: color 0.3s;
    }

    .email a:hover {
      color: rgba(232,228,221,0.55);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Alexander Oettl</h1>
    <div class="rule"></div>
    <div class="details">
      Professor of Strategy and Innovation<br>
      Scheller College of Business<br>
      Georgia Institute of Technology
    </div>
    <div class="email">
      <a href="mailto:aoettl3@gatech.edu">aoettl3@gatech.edu</a>
    </div>
  </div>
</body>
</html>
